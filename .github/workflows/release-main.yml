name: Release (main channel)

# Continuous internal build: every push to `main` produces an unsigned,
# best-effort prerelease that existing "main channel" desktop installs
# auto-update to. This intentionally skips the CHANGELOG.md gate and the
# draft/notarization dance in release.yml — occasional failed runs here are
# expected and acceptable.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute continuous build version
        id: version
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = pkg.version.split('-')[0].split('.').map(Number);
          const version = `${major}.${minor}.${patch + 1}-main.${process.env.GITHUB_RUN_NUMBER}`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${version}\n`);
          NODE

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpenChamber ${{ steps.version.outputs.version }} (main)
          prerelease: true
          draft: false
          generate_release_notes: false
          body: |
            Automated continuous build from `main` @ ${{ github.sha }}.

            > ${{ github.event.head_commit.message || 'manual dispatch' }}

            Internal "main channel" build — unsigned/ad-hoc-signed, best-effort.
            Not a stable release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    needs: compute-version
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get bundled OpenCode CLI version
        id: opencode_cli_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').dependencies['@opencode-ai/sdk']")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache bundled OpenCode CLI artifact
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: packages/electron/.cache/opencode-cli
          key: opencode-cli-${{ runner.os }}-arm64-${{ steps.opencode_cli_version.outputs.version }}
          restore-keys: |
            opencode-cli-${{ runner.os }}-arm64-

      - name: Build Electron app (unsigned, main channel)
        working-directory: packages/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          OPENCHAMBER_UPDATE_CHANNEL: main
        run: |
          set -euo pipefail
          bun run build:web-assets
          bun run prepare:opencode-cli
          bun run verify:opencode-cli
          bun run bundle:main
          bun run rebuild:native
          ./node_modules/.bin/electron-builder --mac --arm64 --publish=never \
            -c.publish.channel=main \
            -c.extraMetadata.version=${{ needs.compute-version.outputs.version }}
          bun run verify:opencode-cli:packaged

      - name: Ad-hoc sign packaged app
        # No Apple Developer certs for this internal channel. electron-updater's
        # Squirrel.Mac still requires *some* code signature to apply updates, so
        # self-sign ad-hoc (free, no secrets/Apple ID needed). First-run still
        # shows a Gatekeeper "unidentified developer" prompt (right-click ->
        # Open) — expected for an internal, unsigned build.
        run: |
          set -euo pipefail
          APP_DIR="packages/electron/dist/mac-arm64"
          [ -d "$APP_DIR" ] || APP_DIR="packages/electron/dist/mac"
          APP_PATH=$(find "$APP_DIR" -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found under packages/electron/dist/mac*"
            ls -la packages/electron/dist/
            exit 1
          fi
          codesign --force --deep --sign - "$APP_PATH"
          codesign -vv "$APP_PATH"

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.compute-version.outputs.tag }}
          files: |
            packages/electron/dist/*.dmg
            packages/electron/dist/*.zip
            packages/electron/dist/*.blockmap
            packages/electron/dist/main-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    needs: compute-version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Verify native Linux architecture
        run: |
          set -euo pipefail
          test "$(uname -m)" = "aarch64"
          test "$(node -p 'process.arch')" = "arm64"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get bundled OpenCode CLI version
        id: opencode_cli_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').dependencies['@opencode-ai/sdk']")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache bundled OpenCode CLI artifact
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: packages/electron/.cache/opencode-cli
          key: opencode-cli-${{ runner.os }}-arm64-${{ steps.opencode_cli_version.outputs.version }}
          restore-keys: |
            opencode-cli-${{ runner.os }}-arm64-

      - name: Run focused Electron release tests
        working-directory: packages/electron
        run: |
          bun run test:architecture
          bun run test:updater

      - name: Build and package Linux AppImage (main channel)
        working-directory: packages/electron
        env:
          OPENCHAMBER_TARGET_ARCH: arm64
          OPENCHAMBER_UPDATE_CHANNEL: main
        run: |
          set -euo pipefail
          bun run build:web-assets
          bun run prepare:opencode-cli
          bun run verify:opencode-cli
          bun run bundle:main
          bun run rebuild:native
          node ./scripts/package.mjs --linux --arm64 --publish=never \
            -c.publish.channel=main \
            -c.extraMetadata.version=${{ needs.compute-version.outputs.version }}
          bun run verify:opencode-cli:packaged
          bun run verify:linux-appimage

      - name: Validate Linux update manifest
        working-directory: packages/electron
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          set -euo pipefail
          APPIMAGE="dist/OpenChamber-${VERSION}-linux-arm64.AppImage"
          node ./scripts/verify-update-manifest.mjs "dist/main-linux-arm64.yml" "$APPIMAGE" "$VERSION"

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.compute-version.outputs.tag }}
          files: |
            packages/electron/dist/*.AppImage
            packages/electron/dist/main-linux-arm64.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
